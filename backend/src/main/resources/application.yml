spring:
  application:
    name: nexo-ontology-engine

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5434/nexo_ontology}
    username: ${DB_USERNAME:nexo}
    password: ${DB_PASSWORD:nexo_secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 5000ms

  graphql:
    graphiql:
      enabled: true
    schema:
      locations: classpath:graphql/

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: nexo-ontology

nexo:
  n8n:
    webhook-secret: ${N8N_WEBHOOK_SECRET:nexo-n8n-secret}
    callback-base-url: ${N8N_CALLBACK_URL:http://localhost:8081}
  jwt:
    secret: ${JWT_SECRET:nexo-ontology-super-secret-key-that-is-at-least-256-bits-long!}
    expiration-ms: ${JWT_EXPIRATION:86400000}
  cdc:
    enabled: ${CDC_ENABLED:false}
  security:
    auth-enforced: ${AUTH_ENFORCED:false}
  llm:
    provider: ${NEXO_LLM_PROVIDER:none}
    max-tokens: ${NEXO_LLM_MAX_TOKENS:4096}
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      model: ${ANTHROPIC_MODEL:claude-sonnet-4-5-20251001}
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_MODEL:gpt-4o}
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      model: ${OLLAMA_MODEL:qwen2.5:7b}
